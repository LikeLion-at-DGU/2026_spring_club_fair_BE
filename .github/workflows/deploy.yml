name: Deploy Django with Docker

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python manage.py test

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/club-fair:latest .

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/club-fair:latest

      - name: Deploy to server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/club-fair:latest

            docker stop club-fair || true
            docker rm club-fair || true

            docker volume create sqlite_data || true
            docker volume create staticfiles || true
            docker volume create media || true

            docker run -d --name club-fair \
              -p 8000:8000 \
              --env-file /home/${{ secrets.SERVER_USER }}/.env \
              -v sqlite_data:/app/data \
              -v staticfiles:/app/staticfiles \
              -v media:/app/media \
              --restart always \
              ${{ secrets.DOCKERHUB_USERNAME }}/club-fair:latest
